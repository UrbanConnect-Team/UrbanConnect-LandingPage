<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UrbanConnect | Login</title>
<link rel="stylesheet" href="css/global.css" />
<link rel="stylesheet" href="css/login.css" />
</head>

<body>
  <main class="page">

    <!-- Decoración de fondo -->
    <div class="cloud left"></div>
    <div class="cloud right"></div>

    <div class="route-line one"></div>
    <div class="route-line two"></div>

    <!-- Íconos flotantes -->
    <div class="float-card users">
      <img src="img/icon-users.png" alt="Usuarios" />
    </div>

    <div class="float-card shield">
      <img src="img/icon-shield.png" alt="Seguridad" />
    </div>

    <div class="float-card chat">
      <img src="img/icon-chat.png" alt="Mensajes" />
    </div>

    <!-- Tarjeta de login -->
    <section class="login-card">

      <div class="logo">
        <img 
          src="img/logo-urbanconnect.png" 
          alt="Logo urbanConnect" 
          class="logo-img" 
        />

        <div class="brand">
          urban<span>Connect</span>
        </div>
      </div>

      <h1>Iniciar sesión</h1>

      <form id="loginForm">

        <div class="form-group">
          <label for="login">Usuario</label>

          <div class="input-box">
            <span class="input-symbol">👤</span>

            <input 
              type="text" 
              id="login" 
              placeholder="Ingresa tu usuario" 
              required 
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>

          <div class="input-box">
            <span class="input-symbol">🔒</span>

            <input 
              type="password" 
              id="password" 
              placeholder="Ingresa tu contraseña" 
              required 
            />

            <button 
              class="eye-icon" 
              type="button" 
              onclick="togglePassword()"
            >
            </button>
          </div>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" />
            Recordarme
          </label>

          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-primary">
          Iniciar sesión <span>→</span>
        </button>

        <div class="divider">o</div>

        <button type="button" class="google-btn">
          <span class="google-g">G</span>
          Continuar con Google
        </button>

        <p class="register">
          ¿No tienes cuenta?
          <a href="registro.html">Regístrate</a>
        </p>

      </form>
    </section>

    <!-- Texto inferior de seguridad -->
    <div class="secure">
      <img src="img/icon-shield.png" alt="Seguridad" />

      <div>
        <strong>Plataforma segura para tu comunidad</strong>
        Tus datos están protegidos
      </div>
    </div>

    <!-- Imagen de ciudad -->
    <img 
      src="img/city-background.png" 
      alt="Ciudad urbanConnect" 
      class="city-img" 
    />

  </main>

  <script src="js/login.js"></script>
</body>
</html>
